<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">IoT-Based Smart Plant Monitoring System architecture</title>
  <desc id="desc">Flowchart showing sensors sending data to Arduino, then Raspberry Pi, MariaDB, and Flask web interface.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f4f1ea"/>
      <stop offset="1" stop-color="#e8edf9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop stop-color="#3d5afe"/>
      <stop offset="1" stop-color="#7b61ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0d0d0d" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0l12 6-12 6z" fill="#3d5afe"/>
    </marker>
  </defs>
  <rect width="1200" height="520" fill="url(#bg)"/>
  <g opacity=".13" stroke="#3d5afe" stroke-width="1">
    <path d="M0 104h1200M0 208h1200M0 312h1200M0 416h1200"/>
    <path d="M150 0v520M300 0v520M450 0v520M600 0v520M750 0v520M900 0v520M1050 0v520"/>
  </g>
  <text x="72" y="74" fill="#0d0d0d" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900">IoT-Based Smart Plant Monitoring System</text>
  <text x="72" y="108" fill="#4a4a4a" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Sensor readings flow from plant conditions into control, storage, and web monitoring.</text>
  <g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(74 184)">
      <rect width="206" height="152" rx="24" fill="#ffffff" stroke="#d7dbea"/>
      <text x="103" y="46" text-anchor="middle" fill="#0d0d0d" font-size="18" font-weight="900">SENSORS</text>
      <text x="103" y="80" text-anchor="middle" fill="#4a4a4a" font-size="13" font-weight="700">Temperature</text>
      <text x="103" y="104" text-anchor="middle" fill="#4a4a4a" font-size="13" font-weight="700">Light + Water Level</text>
      <text x="103" y="128" text-anchor="middle" fill="#4a4a4a" font-size="13" font-weight="700">Rotary Control</text>
    </g>
    <g transform="translate(370 184)">
      <rect width="176" height="152" rx="24" fill="#101726" stroke="#3d5afe" stroke-width="2"/>
      <text x="88" y="74" text-anchor="middle" fill="#f4f1ea" font-size="20" font-weight="900">ARDUINO</text>
      <text x="88" y="106" text-anchor="middle" fill="#c8d0ff" font-size="13" font-weight="700">Control LED, buzzer, LCD</text>
    </g>
    <g transform="translate(636 184)">
      <rect width="196" height="152" rx="24" fill="#101726" stroke="#7b61ff" stroke-width="2"/>
      <text x="98" y="70" text-anchor="middle" fill="#f4f1ea" font-size="20" font-weight="900">RASPBERRY PI</text>
      <text x="98" y="104" text-anchor="middle" fill="#d8d0ff" font-size="13" font-weight="700">Serial data processing</text>
    </g>
    <g transform="translate(916 150)">
      <rect width="198" height="92" rx="22" fill="#ffffff" stroke="#d7dbea"/>
      <text x="99" y="56" text-anchor="middle" fill="#0d0d0d" font-size="18" font-weight="900">MARIADB</text>
    </g>
    <g transform="translate(916 284)">
      <rect width="198" height="92" rx="22" fill="#ffffff" stroke="#d7dbea"/>
      <text x="99" y="56" text-anchor="middle" fill="#0d0d0d" font-size="18" font-weight="900">FLASK WEB UI</text>
    </g>
  </g>
  <g fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M280 260h78"/>
    <path d="M546 260h78"/>
    <path d="M832 250c40-40 42-54 74-54"/>
    <path d="M832 270c42 42 44 60 74 60"/>
  </g>
  <g fill="#4ade80">
    <circle cx="296" cy="260" r="7"/>
    <circle cx="562" cy="260" r="7"/>
    <circle cx="848" cy="250" r="7"/>
    <circle cx="848" cy="270" r="7"/>
  </g>
</svg>
