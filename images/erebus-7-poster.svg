<!-- REPLACE: actual Erebus-7 gameplay poster thumbnail if you export a frame from the video. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Erebus-7 gameplay poster</title>
  <desc id="desc">A dark space station corridor with detection HUD styling for the Erebus-7 stealth horror game.</desc>
  <defs>
    <radialGradient id="void" cx="50%" cy="42%" r="72%">
      <stop offset="0" stop-color="#151b25"/>
      <stop offset=".5" stop-color="#081015"/>
      <stop offset="1" stop-color="#020305"/>
    </radialGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102c31"/>
      <stop offset=".45" stop-color="#0a1019"/>
      <stop offset="1" stop-color="#26101b"/>
    </linearGradient>
    <linearGradient id="danger" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3d5afe"/>
      <stop offset=".5" stop-color="#7b61ff"/>
      <stop offset="1" stop-color="#ff315a"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#void)"/>
  <path d="M120 780 620 312h360l500 468Z" fill="url(#floor)" opacity=".86"/>
  <g stroke="#3d5afe" stroke-width="2" opacity=".28">
    <path d="M800 330v450"/>
    <path d="M635 330 250 780M965 330l385 450"/>
    <path d="M520 430h560M410 548h780M292 690h1016"/>
  </g>
  <g opacity=".38" stroke="#f4f1ea" stroke-width="3" fill="none">
    <path d="M430 252h740v130H430z"/>
    <path d="M506 252v130M1094 252v130"/>
    <path d="M610 252v-74h380v74"/>
  </g>
  <g filter="url(#glow)">
    <path d="M812 378c46 44 73 102 72 171-1 116-72 176-72 176s-72-60-72-176c0-69 26-127 72-171z" fill="#1bffb0" opacity=".36"/>
    <circle cx="812" cy="510" r="52" fill="#7b61ff" opacity=".26"/>
    <path d="M714 612c58-26 136-26 194 0" stroke="#ff315a" stroke-width="10" opacity=".62" fill="none"/>
  </g>
  <g opacity=".55">
    <rect x="1120" y="132" width="320" height="18" rx="9" fill="rgba(244,241,234,.18)"/>
    <rect x="1120" y="132" width="238" height="18" rx="9" fill="url(#danger)"/>
    <text x="1120" y="112" fill="#ff8ca4" font-family="Arial, sans-serif" font-size="24" font-weight="900" letter-spacing="5">DETECTION</text>
  </g>
  <g opacity=".22" fill="#f4f1ea">
    <circle cx="178" cy="142" r="4"/>
    <circle cx="354" cy="248" r="3"/>
    <circle cx="1386" cy="238" r="4"/>
    <circle cx="1324" cy="682" r="3"/>
    <circle cx="230" cy="708" r="3"/>
  </g>
  <rect y="650" width="1600" height="250" fill="rgba(0,0,0,.38)"/>
  <text x="88" y="750" fill="#f4f1ea" font-family="Arial, sans-serif" font-size="62" font-weight="900">EREBUS-7: FIRST SKIN</text>
  <text x="92" y="810" fill="#88ffe1" font-family="Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="6">STEALTH HORROR GAMEPLAY PREVIEW</text>
