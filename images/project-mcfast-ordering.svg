<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">McFast Ordering System interface graphic</title>
  <desc id="desc">Stylized fast-food ordering app interface with menu cards, cart sidebar, and receipt preview.</desc>
  <defs>
