<!-- REPLACE: actual gameplay poster thumbnail if you export a frame from the video. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Piano Tiles gameplay poster</title>
  <desc id="desc">Alien-themed piano tiles lanes with falling purple and blue tiles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090716"/>
      <stop offset=".52" stop-color="#170f34"/>
      <stop offset="1" stop-color="#06070d"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3d5afe"/>
      <stop offset="1" stop-color="#7b61ff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity=".42" stroke="#f4f1ea" stroke-width="1">
    <path d="M0 740h1600M0 620h1600M0 500h1600"/>
    <path d="M360 90v700M580 90v700M800 90v700M1020 90v700M1240 90v700"/>
  </g>
  <g opacity=".34" fill="#f4f1ea">
    <circle cx="145" cy="120" r="4"/>
    <circle cx="310" cy="238" r="3"/>
    <circle cx="1380" cy="168" r="4"/>
    <circle cx="1290" cy="512" r="3"/>
    <circle cx="180" cy="658" r="3"/>
    <circle cx="1120" cy="78" r="5"/>
  </g>
  <g filter="url(#glow)">
    <rect x="392" y="142" width="156" height="168" rx="18" fill="url(#tile)"/>
    <rect x="634" y="252" width="156" height="206" rx="18" fill="url(#tile)" opacity=".9"/>
    <rect x="864" y="108" width="156" height="184" rx="18" fill="url(#tile)" opacity=".82"/>
    <rect x="1094" y="368" width="156" height="226" rx="18" fill="url(#tile)" opacity=".96"/>
  </g>
  <g transform="translate(800 700)">
    <circle r="62" fill="rgba(61,90,254,.94)" filter="url(#glow)"/>
    <path d="M-16-24 30 0-16 24z" fill="#fff"/>
  </g>
  <text x="88" y="126" fill="#f4f1ea" font-family="Arial, sans-serif" font-size="54" font-weight="900">PIANO TILES</text>
  <text x="92" y="182" fill="#9da8ff" font-family="Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="6">GAMEPLAY PREVIEW</text>
</svg>
