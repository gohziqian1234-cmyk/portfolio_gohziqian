  </defs>
  <g fill="#f4f1ea" font-family="Inter, Arial, sans-serif" font-weight="900">
    <text x="44" y="518" font-size="28" letter-spacing="3">IoT-BASED SMART PLANT</text>
    <text x="44" y="554" font-size="28" letter-spacing="3">MONITORING SYSTEM</text>
  </g>
