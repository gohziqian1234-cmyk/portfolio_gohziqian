      <path d="M255 84v82"/>
      <path d="M190 208h-40"/>
      <path d="M150 218h46"/>
    </g>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0l10 5-10 5z" fill="#7b61ff"/>
