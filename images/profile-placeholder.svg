  <text x="76" y="108" fill="#f4f1ea" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900" letter-spacing="5">REPLACE WITH PORTRAIT</text>
  <text x="76" y="145" fill="#9f9f9f" font-family="Inter, Arial, sans-serif" font-size="18">Recommended 800 x 1000px</text>
</svg>
