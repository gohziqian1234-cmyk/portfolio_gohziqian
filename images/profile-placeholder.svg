<!-- REPLACE: profile photo placeholder for Ziqian. Swap with an 800x1000px portrait. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-labelledby="title desc">
  <title id="title">Profile portrait placeholder</title>
  <desc id="desc">Clean portrait placeholder frame for Ziqian.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15151b"/>
      <stop offset="1" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3d5afe"/>
      <stop offset="1" stop-color="#7b61ff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" rx="44" fill="url(#bg)"/>
  <rect x="30" y="30" width="740" height="940" rx="34" fill="none" stroke="url(#accent)" stroke-width="8" opacity=".8"/>
  <circle cx="400" cy="360" r="150" fill="#f4f1ea" opacity=".9"/>
  <path d="M164 902c36-244 126-352 236-352s200 108 236 352H164z" fill="#f4f1ea" opacity=".9"/>
